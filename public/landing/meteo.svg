<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="800">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="temp-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round-main">
      <rect x="80" y="120" width="640" height="560" rx="24"/>
    </clipPath>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="480" x2="800" y2="480"/><line x1="0" y1="640" x2="800" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="800"/><line x1="320" y1="0" x2="320" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/><line x1="640" y1="0" x2="640" y2="800"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="250" cy="350" r="200" fill="#0ea5e9" opacity="0.06" filter="url(#glow)"/>
  <circle cx="580" cy="500" r="180" fill="#38bdf8" opacity="0.05" filter="url(#glow)"/>

  <!-- Main card -->
  <g clip-path="url(#round-main)">
    <rect x="80" y="120" width="640" height="560" rx="24" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="80" y="120" width="640" height="56" fill="#ffffff" fill-opacity="0.03"/>
    <line x1="80" y1="176" x2="720" y2="176" stroke="#ffffff" stroke-opacity="0.06"/>
    <circle cx="112" cy="148" r="6" fill="#38bdf8" opacity="0.8"/>
    <circle cx="134" cy="148" r="6" fill="#ffffff" opacity="0.15"/>
    <circle cx="156" cy="148" r="6" fill="#ffffff" opacity="0.15"/>
    <rect x="200" y="140" width="130" height="8" rx="4" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="200" y="154" width="85" height="6" rx="3" fill="#ffffff" fill-opacity="0.06"/>
  </g>

  <!-- Left: Temperature gauge + current weather -->
  <g transform="translate(110, 200)">
    <rect width="260" height="200" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>

    <!-- Big temperature display -->
    <text x="30" y="60" fill="#ffffff" font-family="system-ui, sans-serif" font-size="48" font-weight="700" opacity="0.9">-12°</text>
    <text x="155" y="52" fill="#7dd3fc" font-family="system-ui, sans-serif" font-size="14" opacity="0.6">C</text>

    <!-- Weather icon: snowflake -->
    <g transform="translate(210, 42)">
      <circle r="22" fill="#38bdf8" opacity="0.12" stroke="#38bdf8" stroke-opacity="0.3" stroke-width="1"/>
      <g stroke="#7dd3fc" stroke-width="1.8" stroke-linecap="round" opacity="0.8">
        <line x1="0" y1="-10" x2="0" y2="10"/>
        <line x1="-8.66" y1="-5" x2="8.66" y2="5"/>
        <line x1="-8.66" y1="5" x2="8.66" y2="-5"/>
        <line x1="0" y1="-10" x2="-3" y2="-7"/><line x1="0" y1="-10" x2="3" y2="-7"/>
        <line x1="0" y1="10" x2="-3" y2="7"/><line x1="0" y1="10" x2="3" y2="7"/>
      </g>
    </g>

    <!-- Params -->
    <line x1="20" y1="82" x2="240" y2="82" stroke="#ffffff" stroke-opacity="0.05"/>
    <g transform="translate(20, 98)">
      <rect width="8" height="8" rx="2" fill="#38bdf8" opacity="0.4"/>
      <rect x="16" y="1" width="50" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.08"/>
      <text x="120" y="7" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" opacity="0.5" text-anchor="end">85%</text>
      <rect x="130" y="0" width="100" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.04"/>
      <rect x="130" y="0" width="85" height="7" rx="3.5" fill="#38bdf8" fill-opacity="0.25"/>
    </g>
    <g transform="translate(20, 120)">
      <rect width="8" height="8" rx="2" fill="#7dd3fc" opacity="0.3"/>
      <rect x="16" y="1" width="60" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.08"/>
      <text x="120" y="7" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" opacity="0.5" text-anchor="end">4 м/с</text>
      <rect x="130" y="0" width="100" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.04"/>
      <rect x="130" y="0" width="40" height="7" rx="3.5" fill="#7dd3fc" fill-opacity="0.2"/>
    </g>
    <g transform="translate(20, 142)">
      <rect width="8" height="8" rx="2" fill="#38bdf8" opacity="0.2"/>
      <rect x="16" y="1" width="55" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.08"/>
      <text x="120" y="7" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" opacity="0.5" text-anchor="end">762</text>
      <rect x="130" y="0" width="100" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.04"/>
      <rect x="130" y="0" width="68" height="7" rx="3.5" fill="#38bdf8" fill-opacity="0.15"/>
    </g>

    <!-- Status badge -->
    <g transform="translate(20, 168)">
      <rect width="100" height="20" rx="10" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="1"/>
      <circle cx="14" cy="10" r="3" fill="#f59e0b" opacity="0.8"/>
      <rect x="24" y="7" width="60" height="5" rx="2.5" fill="#f59e0b" fill-opacity="0.5"/>
    </g>
  </g>

  <!-- Right: Temperature line chart -->
  <g transform="translate(400, 200)">
    <rect width="280" height="200" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
    <rect x="20" y="18" width="100" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="20" y="30" width="65" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.06"/>

    <!-- Chart area -->
    <g transform="translate(20, 50)">
      <line x1="0" y1="0" x2="240" y2="0" stroke="#ffffff" stroke-opacity="0.03"/>
      <line x1="0" y1="35" x2="240" y2="35" stroke="#ffffff" stroke-opacity="0.03"/>
      <line x1="0" y1="70" x2="240" y2="70" stroke="#ffffff" stroke-opacity="0.03"/>
      <line x1="0" y1="105" x2="240" y2="105" stroke="#ffffff" stroke-opacity="0.03"/>
      <line x1="0" y1="130" x2="240" y2="130" stroke="#ffffff" stroke-opacity="0.04"/>

      <!-- Y labels -->
      <text x="-4" y="4" fill="#ffffff" font-family="system-ui, sans-serif" font-size="8" opacity="0.2" text-anchor="end">0°</text>
      <text x="-4" y="39" fill="#ffffff" font-family="system-ui, sans-serif" font-size="8" opacity="0.2" text-anchor="end">-5°</text>
      <text x="-4" y="74" fill="#ffffff" font-family="system-ui, sans-serif" font-size="8" opacity="0.2" text-anchor="end">-10°</text>
      <text x="-4" y="109" fill="#ffffff" font-family="system-ui, sans-serif" font-size="8" opacity="0.2" text-anchor="end">-15°</text>

      <!-- Temperature line -->
      <polyline points="0,80 30,75 60,68 90,85 120,90 150,72 180,60 210,55 240,65"
        stroke="#38bdf8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-sm)"/>
      <!-- Fill area -->
      <polygon points="0,80 30,75 60,68 90,85 120,90 150,72 180,60 210,55 240,65 240,130 0,130"
        fill="#38bdf8" fill-opacity="0.08"/>

      <!-- Dots -->
      <circle cx="60" cy="68" r="3" fill="#38bdf8" opacity="0.8"/>
      <circle cx="120" cy="90" r="3" fill="#38bdf8" opacity="0.8"/>
      <circle cx="210" cy="55" r="4" fill="#38bdf8" filter="url(#glow-sm)"/>

      <!-- Wind line (secondary) -->
      <polyline points="0,100 30,95 60,110 90,105 120,115 150,108 180,95 210,100 240,92"
        stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="4 3" opacity="0.4" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Bottom left: Station map markers -->
  <g transform="translate(110, 430)">
    <rect width="260" height="220" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
    <rect x="20" y="18" width="120" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="20" y="30" width="75" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.06"/>

    <!-- Map-like background -->
    <g transform="translate(20, 48)" opacity="0.08">
      <path d="M0 80 Q40 60 80 75 T160 70 T240 85" stroke="#ffffff" stroke-width="1" fill="none"/>
      <path d="M0 100 Q50 90 100 95 T200 88 T240 95" stroke="#ffffff" stroke-width="0.8" fill="none"/>
      <path d="M0 120 Q60 110 120 115 T240 108" stroke="#ffffff" stroke-width="0.6" fill="none"/>
    </g>

    <!-- Station markers -->
    <g transform="translate(60, 85)">
      <circle r="16" fill="#38bdf8" opacity="0.08"/><circle r="10" fill="#38bdf8" opacity="0.12"/>
      <circle r="5" fill="#38bdf8" opacity="0.9"/>
      <text x="0" y="-22" text-anchor="middle" fill="#7dd3fc" font-family="system-ui, sans-serif" font-size="9" opacity="0.6">АДМС-1</text>
    </g>
    <g transform="translate(160, 110)">
      <circle r="16" fill="#38bdf8" opacity="0.08"/><circle r="10" fill="#38bdf8" opacity="0.12"/>
      <circle r="5" fill="#38bdf8" opacity="0.9"/>
      <text x="0" y="-22" text-anchor="middle" fill="#7dd3fc" font-family="system-ui, sans-serif" font-size="9" opacity="0.6">АДМС-2</text>
    </g>
    <g transform="translate(110, 155)">
      <circle r="16" fill="#f59e0b" opacity="0.08"/><circle r="10" fill="#f59e0b" opacity="0.12"/>
      <circle r="5" fill="#f59e0b" opacity="0.9"/>
      <text x="0" y="-22" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="9" opacity="0.6">ЭКО-1</text>
    </g>
    <g transform="translate(200, 75)">
      <circle r="12" fill="#38bdf8" opacity="0.06"/><circle r="7" fill="#38bdf8" opacity="0.1"/>
      <circle r="3.5" fill="#38bdf8" opacity="0.7"/>
    </g>

    <!-- Connection lines -->
    <line x1="60" y1="85" x2="160" y2="110" stroke="#38bdf8" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="3 4"/>
    <line x1="160" y1="110" x2="110" y2="155" stroke="#38bdf8" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="3 4"/>
  </g>

  <!-- Bottom right: Meteogram forecast -->
  <g transform="translate(400, 430)">
    <rect width="280" height="220" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
    <rect x="20" y="18" width="90" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="20" y="30" width="55" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.06"/>

    <!-- Day columns -->
    <g transform="translate(20, 50)">
      <!-- Day separators -->
      <line x1="60" y1="0" x2="60" y2="150" stroke="#ffffff" stroke-opacity="0.04"/>
      <line x1="120" y1="0" x2="120" y2="150" stroke="#ffffff" stroke-opacity="0.04"/>
      <line x1="180" y1="0" x2="180" y2="150" stroke="#ffffff" stroke-opacity="0.04"/>

      <!-- Day labels -->
      <text x="30" y="-4" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" opacity="0.3">Пн</text>
      <text x="90" y="-4" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" opacity="0.3">Вт</text>
      <text x="150" y="-4" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" opacity="0.3">Ср</text>
      <text x="210" y="-4" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" opacity="0.3">Чт</text>

      <!-- Precipitation bars -->
      <rect x="15" y="100" width="30" height="50" rx="3" fill="url(#bar1)" opacity="0.5"/>
      <rect x="75" y="115" width="30" height="35" rx="3" fill="url(#bar2)" opacity="0.4"/>
      <rect x="135" y="80" width="30" height="70" rx="3" fill="url(#bar1)" opacity="0.6"/>
      <rect x="195" y="125" width="30" height="25" rx="3" fill="url(#bar2)" opacity="0.35"/>

      <!-- Temperature curve over bars -->
      <polyline points="30,40 90,35 150,50 210,30"
        stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
      <circle cx="30" cy="40" r="3" fill="#f59e0b" opacity="0.7"/>
      <circle cx="90" cy="35" r="3" fill="#f59e0b" opacity="0.7"/>
      <circle cx="150" cy="50" r="3" fill="#f59e0b" opacity="0.7"/>
      <circle cx="210" cy="30" r="3" fill="#f59e0b" opacity="0.7"/>

      <!-- Wind arrows -->
      <g transform="translate(30, 70)" opacity="0.3">
        <line x1="0" y1="-6" x2="0" y2="6" stroke="#ffffff" stroke-width="1.2"/>
        <polyline points="-3,-3 0,-6 3,-3" stroke="#ffffff" stroke-width="1.2" fill="none"/>
      </g>
      <g transform="translate(90, 65) rotate(45)" opacity="0.3">
        <line x1="0" y1="-6" x2="0" y2="6" stroke="#ffffff" stroke-width="1.2"/>
        <polyline points="-3,-3 0,-6 3,-3" stroke="#ffffff" stroke-width="1.2" fill="none"/>
      </g>
      <g transform="translate(150, 68) rotate(-20)" opacity="0.3">
        <line x1="0" y1="-6" x2="0" y2="6" stroke="#ffffff" stroke-width="1.2"/>
        <polyline points="-3,-3 0,-6 3,-3" stroke="#ffffff" stroke-width="1.2" fill="none"/>
      </g>
      <g transform="translate(210, 62) rotate(10)" opacity="0.3">
        <line x1="0" y1="-6" x2="0" y2="6" stroke="#ffffff" stroke-width="1.2"/>
        <polyline points="-3,-3 0,-6 3,-3" stroke="#ffffff" stroke-width="1.2" fill="none"/>
      </g>
    </g>

    <!-- Legend -->
    <g transform="translate(20, 210)">
      <rect width="6" height="6" rx="1.5" fill="#38bdf8" opacity="0.6"/>
      <rect x="10" y="0" width="45" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.08"/>
      <rect x="70" width="6" height="6" rx="1.5" fill="#f59e0b" opacity="0.5"/>
      <rect x="80" y="0" width="35" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.08"/>
    </g>
  </g>

  <!-- Floating elements -->
  <g transform="translate(690, 155)" opacity="0.15">
    <circle r="22" fill="#38bdf8" filter="url(#glow-sm)"/>
    <!-- Thermometer icon -->
    <rect x="-3" y="-12" width="6" height="18" rx="3" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="9" r="5" fill="#ffffff" opacity="0.9"/>
  </g>

  <g transform="translate(95, 155)" opacity="0.12">
    <circle r="18" fill="#38bdf8" filter="url(#glow-sm)"/>
    <!-- Cloud icon -->
    <ellipse cx="0" cy="2" rx="10" ry="6" fill="#ffffff" opacity="0.8"/>
    <ellipse cx="-5" cy="0" rx="6" ry="5" fill="#ffffff" opacity="0.8"/>
    <ellipse cx="5" cy="-1" rx="7" ry="5.5" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- Bottom notification -->
  <g transform="translate(340, 695)">
    <rect x="-110" y="-20" width="220" height="40" rx="20" fill="#38bdf8" fill-opacity="0.1" stroke="#38bdf8" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="-86" cy="0" r="6" fill="#f59e0b" opacity="0.8"/>
    <rect x="-72" y="-4" width="110" height="6" rx="3" fill="#ffffff" fill-opacity="0.18"/>
    <rect x="52" y="-4" width="40" height="6" rx="3" fill="#38bdf8" fill-opacity="0.25"/>
  </g>
</svg>
