<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="800">
      <stop offset="0%" stop-color="#1a1225"/>
      <stop offset="100%" stop-color="#2a1a2e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="round-card-main">
      <rect x="80" y="120" width="640" height="560" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
    <line x1="0" y1="640" x2="800" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="800"/>
    <line x1="320" y1="0" x2="320" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/>
    <line x1="640" y1="0" x2="640" y2="800"/>
  </g>

  <!-- Background glow orbs -->
  <circle cx="200" cy="300" r="200" fill="#f43f5e" opacity="0.06" filter="url(#glow)"/>
  <circle cx="600" cy="500" r="180" fill="#e11d48" opacity="0.05" filter="url(#glow)"/>

  <!-- Main dashboard card -->
  <g clip-path="url(#round-card-main)">
    <rect x="80" y="120" width="640" height="560" rx="24" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.08"/>
    
    <!-- Card header bar -->
    <rect x="80" y="120" width="640" height="56" fill="#ffffff" fill-opacity="0.03"/>
    <line x1="80" y1="176" x2="720" y2="176" stroke="#ffffff" stroke-opacity="0.06"/>
    
    <!-- Window dots -->
    <circle cx="112" cy="148" r="6" fill="#f43f5e" opacity="0.8"/>
    <circle cx="134" cy="148" r="6" fill="#ffffff" opacity="0.15"/>
    <circle cx="156" cy="148" r="6" fill="#ffffff" opacity="0.15"/>
    
    <!-- Header title placeholder -->
    <rect x="200" y="140" width="120" height="8" rx="4" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="200" y="154" width="80" height="6" rx="3" fill="#ffffff" fill-opacity="0.06"/>
  </g>

  <!-- Left panel: Document/Contract card -->
  <g transform="translate(110, 200)">
    <rect width="260" height="180" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
    
    <!-- Document icon -->
    <g transform="translate(20, 20)">
      <rect width="36" height="44" rx="4" fill="url(#accent)" opacity="0.15" stroke="url(#accent)" stroke-width="1.5" stroke-opacity="0.4"/>
      <rect x="8" y="10" width="20" height="2.5" rx="1.25" fill="#fb7185" opacity="0.6"/>
      <rect x="8" y="16" width="16" height="2.5" rx="1.25" fill="#fb7185" opacity="0.4"/>
      <rect x="8" y="22" width="20" height="2.5" rx="1.25" fill="#fb7185" opacity="0.3"/>
      <rect x="8" y="28" width="12" height="2.5" rx="1.25" fill="#fb7185" opacity="0.2"/>
      <!-- Fold corner -->
      <path d="M26 0 L36 10 L26 10 Z" fill="#2a1a2e" opacity="0.5"/>
    </g>
    
    <!-- Contract text lines -->
    <rect x="70" y="24" width="100" height="8" rx="4" fill="#ffffff" fill-opacity="0.15"/>
    <rect x="70" y="38" width="70" height="6" rx="3" fill="#ffffff" fill-opacity="0.07"/>
    
    <!-- Status badge -->
    <rect x="70" y="52" width="60" height="18" rx="9" fill="#f43f5e" fill-opacity="0.15" stroke="#f43f5e" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="80" y="59" width="40" height="4" rx="2" fill="#fb7185" opacity="0.7"/>

    <!-- Separator -->
    <line x1="20" y1="80" x2="240" y2="80" stroke="#ffffff" stroke-opacity="0.05"/>

    <!-- Mini table rows -->
    <g transform="translate(20, 92)">
      <rect width="8" height="8" rx="2" fill="#f43f5e" opacity="0.3"/>
      <rect x="16" y="1" width="80" height="6" rx="3" fill="#ffffff" fill-opacity="0.1"/>
      <rect x="160" y="1" width="60" height="6" rx="3" fill="#ffffff" fill-opacity="0.08"/>
    </g>
    <g transform="translate(20, 112)">
      <rect width="8" height="8" rx="2" fill="#fb7185" opacity="0.3"/>
      <rect x="16" y="1" width="100" height="6" rx="3" fill="#ffffff" fill-opacity="0.1"/>
      <rect x="160" y="1" width="50" height="6" rx="3" fill="#ffffff" fill-opacity="0.08"/>
    </g>
    <g transform="translate(20, 132)">
      <rect width="8" height="8" rx="2" fill="#f43f5e" opacity="0.2"/>
      <rect x="16" y="1" width="70" height="6" rx="3" fill="#ffffff" fill-opacity="0.1"/>
      <rect x="160" y="1" width="55" height="6" rx="3" fill="#ffffff" fill-opacity="0.08"/>
    </g>
    <g transform="translate(20, 152)">
      <rect width="8" height="8" rx="2" fill="#fb7185" opacity="0.2"/>
      <rect x="16" y="1" width="90" height="6" rx="3" fill="#ffffff" fill-opacity="0.1"/>
      <rect x="160" y="1" width="45" height="6" rx="3" fill="#ffffff" fill-opacity="0.08"/>
    </g>
  </g>

  <!-- Right panel: Bar chart -->
  <g transform="translate(400, 200)">
    <rect width="280" height="180" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
    
    <!-- Chart title -->
    <rect x="20" y="18" width="90" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="20" y="30" width="60" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.06"/>
    
    <!-- Bar chart -->
    <g transform="translate(20, 50)">
      <!-- Y-axis lines -->
      <line x1="0" y1="0" x2="240" y2="0" stroke="#ffffff" stroke-opacity="0.03"/>
      <line x1="0" y1="28" x2="240" y2="28" stroke="#ffffff" stroke-opacity="0.03"/>
      <line x1="0" y1="56" x2="240" y2="56" stroke="#ffffff" stroke-opacity="0.03"/>
      <line x1="0" y1="84" x2="240" y2="84" stroke="#ffffff" stroke-opacity="0.03"/>
      <line x1="0" y1="112" x2="240" y2="112" stroke="#ffffff" stroke-opacity="0.04"/>
      
      <!-- Bars -->
      <rect x="10" y="28" width="22" height="84" rx="4" fill="url(#bar1)" opacity="0.9"/>
      <rect x="42" y="50" width="22" height="62" rx="4" fill="url(#bar2)" opacity="0.7"/>
      <rect x="74" y="14" width="22" height="98" rx="4" fill="url(#bar1)" opacity="0.9"/>
      <rect x="106" y="42" width="22" height="70" rx="4" fill="url(#bar2)" opacity="0.7"/>
      <rect x="138" y="56" width="22" height="56" rx="4" fill="url(#bar1)" opacity="0.8"/>
      <rect x="170" y="22" width="22" height="90" rx="4" fill="url(#bar2)" opacity="0.7"/>
      <rect x="202" y="8" width="22" height="104" rx="4" fill="url(#bar1)" opacity="0.9" filter="url(#glow-sm)"/>
    </g>
  </g>

  <!-- Bottom left: Donut chart -->
  <g transform="translate(110, 410)">
    <rect width="260" height="240" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
    
    <!-- Chart title -->
    <rect x="20" y="18" width="110" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="20" y="30" width="70" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.06"/>
    
    <!-- Donut chart -->
    <g transform="translate(130, 130)">
      <circle r="60" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="16"/>
      <circle r="60" fill="none" stroke="url(#accent)" stroke-width="16" stroke-dasharray="200 177" stroke-dashoffset="0" stroke-linecap="round" opacity="0.9" transform="rotate(-90)"/>
      <circle r="60" fill="none" stroke="#fb7185" stroke-width="16" stroke-dasharray="90 287" stroke-dashoffset="-200" stroke-linecap="round" opacity="0.6" transform="rotate(-90)"/>
      <circle r="60" fill="none" stroke="#fda4af" stroke-width="16" stroke-dasharray="50 327" stroke-dashoffset="-290" stroke-linecap="round" opacity="0.4" transform="rotate(-90)"/>
      
      <!-- Center text -->
      <text text-anchor="middle" y="-6" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="700" opacity="0.9">78%</text>
      <text text-anchor="middle" y="14" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" opacity="0.4">исполнено</text>
    </g>
    
    <!-- Legend -->
    <g transform="translate(20, 195)">
      <circle cx="6" cy="4" r="4" fill="#f43f5e"/>
      <rect x="16" y="0" width="60" height="6" rx="3" fill="#ffffff" fill-opacity="0.1"/>
      
      <circle cx="106" cy="4" r="4" fill="#fb7185" opacity="0.6"/>
      <rect x="116" y="0" width="50" height="6" rx="3" fill="#ffffff" fill-opacity="0.1"/>
    </g>
    <g transform="translate(20, 215)">
      <circle cx="6" cy="4" r="4" fill="#fda4af" opacity="0.4"/>
      <rect x="16" y="0" width="55" height="6" rx="3" fill="#ffffff" fill-opacity="0.1"/>
      
      <circle cx="106" cy="4" r="4" fill="#ffffff" opacity="0.08"/>
      <rect x="116" y="0" width="45" height="6" rx="3" fill="#ffffff" fill-opacity="0.1"/>
    </g>
  </g>

  <!-- Bottom right: Timeline / workflow -->
  <g transform="translate(400, 410)">
    <rect width="280" height="240" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.06"/>
    
    <!-- Title -->
    <rect x="20" y="18" width="100" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="20" y="30" width="65" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.06"/>
    
    <!-- Workflow steps -->
    <g transform="translate(40, 55)">
      <!-- Step 1 -->
      <circle cx="0" cy="0" r="12" fill="#f43f5e" opacity="0.2" stroke="#f43f5e" stroke-width="2" stroke-opacity="0.6"/>
      <circle cx="0" cy="0" r="4" fill="#f43f5e"/>
      <rect x="26" y="-6" width="80" height="6" rx="3" fill="#ffffff" fill-opacity="0.15"/>
      <rect x="26" y="4" width="120" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.06"/>
      
      <!-- Connector -->
      <line x1="0" y1="14" x2="0" y2="38" stroke="#f43f5e" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="4 3"/>
      
      <!-- Step 2 -->
      <circle cx="0" cy="50" r="12" fill="#f43f5e" opacity="0.2" stroke="#f43f5e" stroke-width="2" stroke-opacity="0.6"/>
      <circle cx="0" cy="50" r="4" fill="#f43f5e"/>
      <rect x="26" y="44" width="100" height="6" rx="3" fill="#ffffff" fill-opacity="0.15"/>
      <rect x="26" y="54" width="140" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.06"/>
      
      <!-- Connector -->
      <line x1="0" y1="64" x2="0" y2="88" stroke="#f43f5e" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="4 3"/>
      
      <!-- Step 3 -->
      <circle cx="0" cy="100" r="12" fill="#fb7185" opacity="0.15" stroke="#fb7185" stroke-width="2" stroke-opacity="0.4"/>
      <circle cx="0" cy="100" r="4" fill="#fb7185" opacity="0.6"/>
      <rect x="26" y="94" width="90" height="6" rx="3" fill="#ffffff" fill-opacity="0.12"/>
      <rect x="26" y="104" width="110" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.05"/>
      
      <!-- Connector -->
      <line x1="0" y1="114" x2="0" y2="138" stroke="#fb7185" stroke-opacity="0.2" stroke-width="2" stroke-dasharray="4 3"/>
      
      <!-- Step 4 (pending) -->
      <circle cx="0" cy="150" r="12" fill="#ffffff" opacity="0.03" stroke="#ffffff" stroke-width="2" stroke-opacity="0.1"/>
      <circle cx="0" cy="150" r="4" fill="#ffffff" opacity="0.15"/>
      <rect x="26" y="144" width="70" height="6" rx="3" fill="#ffffff" fill-opacity="0.08"/>
      <rect x="26" y="154" width="100" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.04"/>
    </g>
  </g>

  <!-- Floating accent elements -->
  <!-- Ruble sign floating -->
  <g transform="translate(680, 160)" opacity="0.15">
    <circle r="24" fill="#f43f5e" filter="url(#glow-sm)"/>
    <text text-anchor="middle" y="8" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="700">₽</text>
  </g>
  
  <!-- Checkmark badge floating -->
  <g transform="translate(100, 160)" opacity="0.12">
    <circle r="20" fill="#f43f5e" filter="url(#glow-sm)"/>
    <path d="M-7 0 L-2 5 L7 -4" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Bottom floating notification -->
  <g transform="translate(340, 690)">
    <rect x="-100" y="-20" width="200" height="40" rx="20" fill="#f43f5e" fill-opacity="0.12" stroke="#f43f5e" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="-78" cy="0" r="6" fill="#f43f5e" opacity="0.8"/>
    <rect x="-64" y="-4" width="100" height="6" rx="3" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="50" y="-4" width="35" height="6" rx="3" fill="#fb7185" fill-opacity="0.3"/>
  </g>
</svg>
